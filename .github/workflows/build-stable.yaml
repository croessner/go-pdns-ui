name: Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  APP_NAME: go-pdns-ui
  GOVULNCHECK_VERSION: v1.3.0
  SYFT_VERSION: v1.16.0

jobs:
  govulncheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.5

      - name: Install govulncheck
        run: |
          GOBIN="$(go env GOPATH)/bin" \
            go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enable Go modules and vendored dependencies
        run: |
          go env -w GO111MODULE=on
          go env -w GOFLAGS=-mod=vendor

      - name: Run govulncheck
        run: make govulncheck

  build-artifact:
    needs: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate release metadata
        run: ./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}" >/dev/null

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.5

      - name: Build and package artifact
        run: |
          version="${GITHUB_REF_NAME}"
          commit="${GITHUB_SHA:0:12}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          asset="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"

          mkdir -p "dist/${asset}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -mod=vendor -trimpath \
              -ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.buildDate=${build_date}" \
              -o "dist/${asset}/${APP_NAME}" \
              ./cmd/go-pdns-ui

          cp LICENSE POLICY.md README.md "dist/${asset}/"
          (
            cd dist
            tar czf "${asset}.tar.gz" "${asset}"
            ls -lah ./*.tar.gz
          )

      - name: Generate SBOM
        run: |
          asset="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          ./scripts/sbom.sh \
            --source-dir "dist/${asset}" \
            --output-dir "dist/${asset}" \
            --output-prefix "${asset}" \
            --skip-docker \
            --syft-version "${SYFT_VERSION}"

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*/*.spdx.json

      - name: Attest release artifact
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          create-storage-record: false
          subject-path: |
            dist/*.tar.gz
            dist/*/*.spdx.json

  create-release:
    needs:
      - govulncheck
      - build-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release_metadata
        run: ./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ steps.release_metadata.outputs.prerelease }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          last_release_tag="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq '.tagName' 2>/dev/null || true)"
          if [[ -n "${last_release_tag}" ]]; then
            ahead_by="$(gh api "repos/${GITHUB_REPOSITORY}/compare/${last_release_tag}...${GITHUB_REF_NAME}" --jq '.ahead_by')"
            if [[ "${ahead_by}" -eq 0 ]]; then
              echo "No new commits since ${last_release_tag}; aborting release creation."
              exit 1
            fi
          fi

          notes_file="$(mktemp)"
          trap 'rm -f "${notes_file}"' EXIT
          ./scripts/release-notes.sh "${GITHUB_REF_NAME}" "${notes_file}" "${last_release_tag}"

          release_args=(
            "${GITHUB_REF_NAME}"
            --repo "${GITHUB_REPOSITORY}"
            --verify-tag
            --notes-file "${notes_file}"
            --generate-notes
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          else
            release_args+=(--latest)
          fi

          gh release create "${release_args[@]}"

  upload-release:
    needs:
      - govulncheck
      - create-release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifact-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          asset="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "dist/${asset}.tar.gz" \
            "dist/${asset}/${asset}-source.spdx.json"
