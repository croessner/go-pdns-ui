name: Production Docker Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  GOVULNCHECK_VERSION: v1.3.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: 1.26.5

      - name: Install govulncheck
        run: |
          GOBIN="$(go env GOPATH)/bin" \
            go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Enable Go modules and vendored dependencies
        run: |
          go env -w GO111MODULE=on
          go env -w GOFLAGS=-mod=vendor

      - name: Run govulncheck
        run: make govulncheck

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag versions
        id: extract_version
        run: |
          prerelease=""
          version=""
          major=""
          minor=""

          {
            while IFS='=' read -r key value; do
              echo "${key}=${value}"
              case "${key}" in
                prerelease) prerelease="${value}" ;;
                version) version="${value}" ;;
                major) major="${value}" ;;
                minor) minor="${value}" ;;
              esac
            done < <(./scripts/release-semver-metadata.sh "${GITHUB_REF_NAME}")

            echo "commit=${GITHUB_SHA:0:8}"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo 'tags<<EOF'
            echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/go-pdns-ui:${version}"
            if [[ "${prerelease}" != "true" ]]; then
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/go-pdns-ui:latest"
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/go-pdns-ui:${major}"
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/go-pdns-ui:${major}.${minor}"
            fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          tags: ${{ steps.extract_version.outputs.tags }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ steps.extract_version.outputs.commit }}
            BUILD_DATE=${{ steps.extract_version.outputs.build_date }}
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=PowerDNS administration UI
