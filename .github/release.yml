changelog:
  exclude:
    authors:
      - github-actions[bot]
      - dependabot[bot]
      - github-copilot[bot]
      - codex[bot]
      - openai-codex[bot]
      - claude[bot]
      - Claude
      - cursor[bot]
  categories:
    - title: Breaking Changes
      labels:
        - breaking-change
        - breaking
    - title: Added
      labels:
        - feature
        - enhancement
    - title: Changed
      labels:
        - change
    - title: Fixed
      labels:
        - bug
        - fix
    - title: Removed
      labels:
        - removal
    - title: Security
      labels:
        - security
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Dependencies
      labels:
        - dependencies
    - title: Other Changes
      labels:
        - "*"
