<!doctype html>
<html lang="{{.Lang}}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{index .L "app_title"}}</title>
  <script>
    (function () {
      const savedTheme = localStorage.getItem("go-pdns-ui-theme");
      if (savedTheme) {
        document.documentElement.setAttribute("data-theme", savedTheme);
      }
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="min-h-screen bg-base-200">
  <header class="navbar bg-base-100 shadow-sm px-4 lg:px-8">
    <div class="flex-1">
      <a href="/" class="text-2xl font-black tracking-tight">{{index .L "app_title"}}</a>
    </div>
    <div class="flex-none gap-2">
      {{if .CurrentUser}}
      <div class="hidden md:flex items-center gap-2">
        <span class="badge badge-outline">{{.CurrentUser.Username}}</span>
        <span class="badge {{if .IsAdmin}}badge-primary{{else}}badge-ghost{{end}}">{{.CurrentUser.Role}}</span>
      </div>
      {{end}}
      <div class="join hidden md:flex">
        {{range .Supported}}
        <a href="/?lang={{.}}" class="btn btn-sm join-item {{if eq $.Lang .}}btn-primary{{else}}btn-ghost{{end}}">{{.}}</a>
        {{end}}
      </div>
      <button id="theme-toggle" type="button" class="btn btn-sm btn-ghost">{{index .L "toggle_theme"}}</button>
      <form method="post" action="/logout">
        <button type="submit" class="btn btn-sm btn-outline">{{index .L "logout"}}</button>
      </form>
    </div>
  </header>

  <main class="container mx-auto p-4 lg:p-8 space-y-6">
    <section class="rounded-box bg-gradient-to-r from-primary to-secondary text-primary-content p-6 shadow-lg">
      <h1 class="text-3xl font-bold">{{index .L "dashboard_title"}}</h1>
      <p class="opacity-90 mt-1">{{index .L "dashboard_intro"}}</p>
      {{if not .IsAdmin}}
      <p class="mt-2 text-sm opacity-90">{{index .L "read_only_mode"}}</p>
      {{end}}
    </section>

    <div id="workspace">
      {{template "workspace" .}}
    </div>
  </main>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById("theme-toggle");
    if (toggle) {
      toggle.addEventListener("click", () => {
        const current = root.getAttribute("data-theme") || "light";
        const next = current === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("go-pdns-ui-theme", next);
      });
    }
  </script>
</body>
</html>
