<!doctype html>
<html lang="{{.Lang}}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{index .L "change_password_title"}} | {{index .L "app_title"}}</title>
  <script nonce="{{.CSPNonce}}">
    (function () {
      const key = "go-pdns-ui-theme";
      const allowedThemes = new Set(["light", "dark"]);
      const root = document.documentElement;

      function readTheme() {
        try {
          return (localStorage.getItem(key) || "").trim().toLowerCase();
        } catch (_) {
          return "";
        }
      }

      function applyTheme(theme) {
        const resolved = allowedThemes.has(theme) ? theme : "light";
        root.setAttribute("data-theme", resolved);
        root.style.colorScheme = resolved;
        try {
          localStorage.setItem(key, resolved);
        } catch (_) {}
      }

      applyTheme(readTheme());
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="hero min-h-screen">
    <div class="hero-content flex-col gap-8 w-full max-w-lg">
      <div class="text-center max-w-lg">
        <h1 class="text-4xl font-black">{{index .L "change_password_title"}}</h1>
        <p class="py-2 opacity-80">{{index .L "change_password_subtitle"}}</p>
        {{if .PasswordChangeRequired}}
        <p class="text-sm opacity-80">{{index .L "password_change_required_hint"}}</p>
        {{end}}
      </div>

      <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
        <div class="card-body gap-4">
          {{if .Error}}
          <div class="alert alert-error text-sm">{{.Error}}</div>
          {{end}}
          <form method="post" action="/account/password" class="space-y-3">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <label class="floating-label">
              <span>{{index .L "current_password"}}</span>
              <input type="password" name="current_password" class="input input-bordered w-full" autocomplete="current-password" required>
            </label>
            <label class="floating-label">
              <span>{{index .L "new_password"}}</span>
              <input type="password" name="new_password" class="input input-bordered w-full" autocomplete="new-password" minlength="8" required>
            </label>
            <label class="floating-label">
              <span>{{index .L "confirm_password"}}</span>
              <input type="password" name="confirm_password" class="input input-bordered w-full" autocomplete="new-password" minlength="8" required>
            </label>
            <button type="submit" class="btn btn-primary w-full">{{index .L "change_password_action"}}</button>
          </form>
          <form method="post" action="/logout">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <button type="submit" class="btn btn-outline w-full">{{index .L "logout"}}</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
