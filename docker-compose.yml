services:
  db:
    image: postgres:16-alpine
    container_name: go-pdns-ui-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pdns
      POSTGRES_USER: pdns
      POSTGRES_PASSWORD: pdns
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdns -d pdns"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:7.2
    container_name: go-pdns-ui-valkey
    restart: unless-stopped

  pdns:
    image: powerdns/pdns-auth-49:latest
    container_name: go-pdns-ui-pdns
    restart: unless-stopped
    volumes:
      - ./deploy/pdns/pdns.conf:/etc/powerdns/pdns.conf:ro
    depends_on:
      db:
        condition: service_healthy
    command:
      - --daemon=no
      - --api=yes
      - --api-key=${PDNS_API_KEY:-change-me}
      - --webserver=yes
      - --webserver-address=0.0.0.0
      - --webserver-allow-from=0.0.0.0/0,::/0
      - --launch=gpgsql
      - --gpgsql-host=db
      - --gpgsql-port=5432
      - --gpgsql-dbname=pdns
      - --gpgsql-user=pdns
      - --gpgsql-password=pdns
      - --gpgsql-dnssec=yes
      - --local-address=0.0.0.0
    ports:
      - "8053:53/tcp"
      - "8053:53/udp"
      - "8081:8081"

  nauthilus:
    image: ghcr.io/croessner/nauthilus:v2.0.6
    container_name: go-pdns-ui-nauthilus
    restart: unless-stopped
    depends_on:
      valkey:
        condition: service_started
    environment:
      TESTING_CSV: /etc/nauthilus/logins.csv
    volumes:
      - ./deploy/nauthilus/nauthilus.yml:/etc/nauthilus/nauthilus.yml:ro
      - ./deploy/nauthilus/idp-signing-key.pem:/etc/nauthilus/idp-signing-key.pem:ro
      - ./deploy/nauthilus/logins.csv:/etc/nauthilus/logins.csv:ro

  proxy:
    image: caddy:2-alpine
    container_name: go-pdns-ui-proxy
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
      nauthilus:
        condition: service_started
    volumes:
      - ./deploy/nauthilus-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8090:443"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: go-pdns-ui-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      pdns:
        condition: service_started
      nauthilus:
        condition: service_started
    extra_hosts:
      - "127.0.0.1.nip.io:host-gateway"
    environment:
      GO_PDNS_UI_LISTEN_ADDRESS: :8080
      GO_PDNS_UI_LOG_LEVEL: INFO
      GO_PDNS_UI_USERNAME: admin
      GO_PDNS_UI_PASSWORD: admin
      GO_PDNS_UI_AUTH_OIDC_ONLY: "false"
      GO_PDNS_UI_AUTHZ_MODE: company
      GO_PDNS_UI_DATABASE_URL: postgres://pdns:pdns@db:5432/pdns?sslmode=disable
      GO_PDNS_UI_DB_MAX_OPEN_CONNS: 10
      GO_PDNS_UI_DB_MAX_IDLE_CONNS: 5
      GO_PDNS_UI_DB_CONN_MAX_LIFETIME_SECONDS: 300
      GO_PDNS_UI_OIDC_DISCOVERY_URL: https://127.0.0.1.nip.io:8090/.well-known/openid-configuration
      GO_PDNS_UI_OIDC_INSECURE_SKIP_VERIFY: "true"
      GO_PDNS_UI_OIDC_CLIENT_ID: go-pdns-ui
      GO_PDNS_UI_OIDC_CLIENT_SECRET: go-pdns-ui-secret
      GO_PDNS_UI_OIDC_REDIRECT_URL: https://ui.127.0.0.1.nip.io:8090/auth/oidc/callback
      GO_PDNS_UI_OIDC_SCOPES: openid profile email groups
      GO_PDNS_UI_OIDC_ADMIN_GROUP: admin
      GO_PDNS_UI_OIDC_USER_GROUP: user
      GO_PDNS_API_URL: http://pdns:8081/api/v1
      GO_PDNS_API_KEY: ${PDNS_API_KEY:-change-me}
      GO_PDNS_SERVER_ID: localhost
      GO_PDNS_HTTP_TIMEOUT_SECONDS: 10

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
